<section class="ASSection">
  <div class="ASContainer">

    <header class="mb-3">
      <h2>Thumbnails Collection</h2>
      <p class="text-muted">
        Image thumbnails and media preview patterns using AS Design System.
      </p>
    </header>

    <div class="ASThumbnailsGrid">

      <!-- ====================================== -->
      <!-- Basic Thumbnails -->
      <!-- ====================================== -->
      <section class="ASThumbnailsBlock">
        <h3>Basic Thumbnails</h3>
        <p>Simple image preview cards</p>

        <div class="ASThumbnailsRow ASThumbnailsRow--4">

  <article class="ASCard ASThumbnail">
    <div class="ASThumbnailMedia">
      <img src="../../assets/img/aseer-1.webp" alt="">
    </div>
  </article>

  <article class="ASCard ASThumbnail">
    <div class="ASThumbnailMedia">
      <img src="../../assets/img/aseer-2.jpg" alt="">
    </div>
  </article>

  <article class="ASCard ASThumbnail">
    <div class="ASThumbnailMedia">
      <img src="../../assets/img/aseer-3.jpg" alt="">
    </div>
  </article>

  <article class="ASCard ASThumbnail">
    <div class="ASThumbnailMedia">
      <img src="../../assets/img/aseer-4.jpg" alt="">
    </div>
  </article>

  <article class="ASCard ASThumbnail">
    <div class="ASThumbnailMedia">
      <img src="../../assets/img/aseer-5.webp" alt="">
    </div>
  </article>

</div>

      </section>

      <!-- ====================================== -->
      <!-- Hover Overlay Thumbnails -->
      <!-- ====================================== -->
      <section class="ASThumbnailsBlock">
        <h3>Hover Overlay</h3>
        <p>Thumbnail with overlay actions</p>

        <div class="ASThumbnailsRow ASThumbnailsRow--4">

          <article class="ASCard ASThumbnail is-hoverable">
            <div class="ASThumbnailMedia">
              <img src="../../assets/img/aseer-2.jpg" alt="">
              <div class="ASThumbnailOverlay">
                <button class="ASBtn ASBtnLight--primary ASBtn--sm">View</button>
              </div>
            </div>
          </article>

          <article class="ASCard ASThumbnail is-hoverable">
            <div class="ASThumbnailMedia">
              <img src="../../assets/img/aseer-3.jpg" alt="">
              <div class="ASThumbnailOverlay">
                <button class="ASBtn ASBtnLight--info ASBtn--sm">Open</button>
              </div>
            </div>
          </article>

        </div>
      </section>

      <!-- ====================================== -->
      <!-- Thumbnail with Caption -->
      <!-- ====================================== -->
      <section class="ASThumbnailsBlock">
        <h3>Thumbnail with Caption</h3>
        <p>Image with title and description</p>

        <div class="ASThumbnailsRow ASThumbnailsRow--3">

          <article class="ASCard ASThumbnail">
            <div class="ASThumbnailMedia">
              <img src="../../assets/img/aseer-5.webp" alt="">
            </div>
            <div class="ASCardBody">
              <h4 class="ASCardTitle">Mountain View</h4>
              <p class="ASCardDescription">Natural landscape photography</p>
            </div>
          </article>

        </div>
      </section>

    </div>
  </div>
</section>
